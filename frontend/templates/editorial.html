<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editorial Updater</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            font-family: system-ui, "Segoe UI", sans-serif;
            background: radial-gradient(ellipse 120% 80% at 50% -20%, #1e3a5f 0%, #030712 55%);
            color: #e5e7eb;
            min-height: 100vh;
        }

        .terminal {
            background: #020617;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            font-family: ui-monospace, "Cascadia Code", monospace;
            font-size: 14px;
            line-height: 1.45;
            overflow-y: auto;
            max-height: min(42vh, 340px);
            color: #86efac;
        }
    </style>
</head>

<body class="px-4 py-10 md:py-14">
    <main class="mx-auto max-w-4xl">
        <div class="mb-8 rounded-2xl border border-white/10 bg-white/[0.04] backdrop-blur-sm px-4 py-3 md:px-6 md:py-4">
            <div class="flex flex-col gap-3 md:flex-row md:items-center md:justify-between">
                <div>
                    <p class="text-cyan-400/90 text-xs font-medium tracking-wide uppercase">Django admin automation</p>
                    <h2 class="text-lg md:text-xl font-semibold text-white">Automation Dashboard</h2>
                </div>
                <div class="flex items-center gap-2">
                    <a href="/"
                        class="rounded-lg border border-white/20 bg-white/5 px-3 py-2 text-xs md:text-sm text-slate-200 hover:bg-white/10 transition-colors">
                        Main Updater
                    </a>
                    <a href="/editorial"
                        class="rounded-lg border border-cyan-500/40 bg-cyan-500/15 px-3 py-2 text-xs md:text-sm text-cyan-100">
                        Editorial Updater
                    </a>
                    <a href="/extract-coding"
                        class="rounded-lg border border-white/20 bg-white/5 px-3 py-2 text-xs md:text-sm text-slate-200 hover:bg-white/10 transition-colors">
                        Extract Coding JSON
                    </a>
                </div>
            </div>
        </div>

        <header class="mb-6">
            <p class="text-cyan-400/90 text-sm font-medium tracking-wide uppercase mb-2">Django admin automation</p>
            <h1 class="text-3xl font-bold text-white mb-2">Editorial update by Question ID</h1>
            <p class="text-slate-400 text-sm">
                Paste JSON in format <code class="text-cyan-300">{"<question_uuid>": "<editorial html/text>"}</code>, then click update.
            </p>
        </header>

        <div class="mb-4 rounded-xl border border-white/10 bg-white/[0.04] px-4 py-3">
            <span class="text-sm text-slate-300 block mb-2">Django admin target</span>
            <div class="flex flex-wrap items-center gap-4">
                <label class="inline-flex items-center gap-2 cursor-pointer text-sm text-slate-200">
                    <input type="radio" name="editorialEnv" value="beta" checked
                        class="accent-cyan-500 w-4 h-4 border-slate-500 bg-slate-800 focus:ring-cyan-500/40">
                    Beta
                </label>
                <label class="inline-flex items-center gap-2 cursor-pointer text-sm text-slate-200">
                    <input type="radio" name="editorialEnv" value="prod"
                        class="accent-cyan-500 w-4 h-4 border-slate-500 bg-slate-800 focus:ring-cyan-500/40">
                    Prod
                </label>
            </div>
        </div>

        <div class="rounded-2xl border border-white/10 bg-white/[0.04] p-4 md:p-5">
            <label for="editorialJson" class="text-sm text-slate-300 block mb-2">Editorial input JSON</label>
            <textarea id="editorialJson" rows="16"
                class="w-full bg-slate-950/80 text-slate-300 border border-slate-600 rounded-lg p-3 font-mono text-xs focus:outline-none focus:ring-2 focus:ring-cyan-500/40 resize-y"
                placeholder='{
  "9405deff-6e49-48d3-8cbe-5b78533c9ad0": "<p>Editorial content here...</p>"
}'></textarea>

            <div class="mt-4 flex items-center gap-3">
                <button id="runEditorialBtn"
                    class="rounded-xl border border-cyan-500/40 bg-cyan-500/10 px-5 py-2.5 text-sm text-cyan-100 hover:bg-cyan-500/20 transition-colors">
                    Update Editorials
                </button>
                <span id="statusLine" class="text-xs text-slate-500"></span>
            </div>
        </div>

        <div class="mt-6">
            <div class="flex items-center justify-between mb-2 px-1">
                <span class="text-xs font-medium text-slate-500">Live logs</span>
                <span class="text-xs text-slate-600">Target = radio above</span>
            </div>
            <div id="terminal" class="terminal p-4 whitespace-pre-wrap"></div>
        </div>
    </main>

    <script>
        const runBtn = document.getElementById('runEditorialBtn');
        const editor = document.getElementById('editorialJson');
        const terminal = document.getElementById('terminal');
        const statusLine = document.getElementById('statusLine');

        function editorialEnvInputs() {
            return document.querySelectorAll('input[name="editorialEnv"]');
        }

        function setRunning(running) {
            runBtn.disabled = running;
            runBtn.classList.toggle('opacity-70', running);
            runBtn.classList.toggle('cursor-not-allowed', running);
            editorialEnvInputs().forEach((el) => { el.disabled = running; });
            statusLine.textContent = running ? 'Running…' : 'Idle';
        }

        function logLine(line, cls) {
            const span = document.createElement('span');
            if (cls === 'err') span.className = 'text-red-400';
            else if (cls === 'warn') span.className = 'text-amber-300';
            else if (cls === 'ok') span.className = 'text-emerald-400';
            else if (cls === 'hdr') span.className = 'text-cyan-300 font-bold';
            span.textContent = line;
            terminal.appendChild(span);
            terminal.appendChild(document.createElement('br'));
            terminal.scrollTop = terminal.scrollHeight;
        }

        function runEditorialUpdate() {
            if (runBtn.disabled) return;
            const rawJson = editor.value || '';
            const content = rawJson.trim();

            if (!content) {
                terminal.textContent = '';
                logLine('Editorial JSON is required.', 'err');
                statusLine.textContent = 'missing input';
                return;
            }

            try {
                JSON.parse(content);
            } catch (e) {
                terminal.textContent = '';
                logLine('Invalid JSON: ' + (e && e.message ? e.message : e), 'err');
                statusLine.textContent = 'invalid JSON';
                return;
            }

            terminal.textContent = '';
            setRunning(true);

            const djangoTarget = document.querySelector('input[name="editorialEnv"]:checked')?.value || 'beta';

            fetch('/api/run_editorial_update', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content: rawJson, django_target_env: djangoTarget })
            })
                .then(r => {
                    if (!r.ok) {
                        return r.json().then(j => { throw new Error(j.message || r.statusText); });
                    }
                    const reader = r.body.getReader();
                    const dec = new TextDecoder();
                    function pump() {
                        return reader.read().then(({ done, value }) => {
                            if (done) {
                                setRunning(false);
                                return;
                            }
                            const chunk = dec.decode(value, { stream: true });
                            const parts = chunk.split('\n\n');
                            for (const line of parts) {
                                if (!line.startsWith('data: ')) continue;
                                const raw = line.slice(6);
                                if (raw.trim() === '>>> DONE') {
                                    logLine('── Done ──', 'ok');
                                    continue;
                                }
                                if (raw.includes('PIPELINE_EXCEPTION') || raw.includes('>>> FAILED') || raw.includes('>>> ERROR')) logLine(raw, 'err');
                                else if (raw.includes('PIPELINE_SKIP') || raw.includes('PIPELINE_SUMMARY')) logLine(raw, 'warn');
                                else if (raw.includes('>>> TARGET') || raw.includes('>>> RUNNING') || raw.includes('>>> SUCCESS')) logLine(raw, 'hdr');
                                else logLine(raw);
                            }
                            return pump();
                        });
                    }
                    return pump();
                })
                .catch(err => {
                    const msg = err && err.message ? err.message : String(err);
                    logLine('Error: ' + msg, 'err');
                    setRunning(false);
                    statusLine.textContent = 'failed';
                });
        }

        runBtn.addEventListener('click', runEditorialUpdate);
    </script>
</body>

</html>
